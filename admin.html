<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limited Edition | لوحة التحكم</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-50 dark:bg-[#0a0a0a] text-gray-900 dark:text-gray-100 transition-colors duration-300 antialiased min-h-screen flex flex-col justify-between">

    <!-- رسالة الإشعار الشيك (Toast) -->
    <div id="toast-notification" class="fixed top-24 left-1/2 transform -translate-x-1/2 -translate-y-20 opacity-0 z-[100] flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl transition-all duration-500 pointer-events-none w-[90%] max-w-sm bg-neutral-900 dark:bg-white text-white dark:text-black">
        <div id="toast-icon-container" class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-green-500">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        </div>
        <span id="toast-message" class="font-bold text-sm md:text-base"></span>
    </div>

    <!-- نافذة الباسورد السرية والخفيفة -->
    <div id="auth-screen" class="fixed inset-0 z-50 bg-black/90 backdrop-blur-md flex items-center justify-center px-4 transition-opacity duration-300">
        <div class="bg-white dark:bg-neutral-900 w-full max-w-sm rounded-3xl p-8 shadow-2xl border border-gray-100 dark:border-neutral-800 text-center">
            <h3 class="text-xl font-bold mb-2">أدخل كلمة المرور</h3>
            <p class="text-xs text-gray-400 mb-6">منطقة خاصة بالأدمن فقط</p>
            <form id="pass-form" class="flex flex-col gap-4">
                <input type="password" id="pass-input" required autofocus placeholder="••••••" class="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-black border border-gray-200 dark:border-gray-800 focus:outline-none focus:border-gray-900 dark:focus:border-white text-center tracking-widest text-xl">
                <button type="submit" class="w-full py-3.5 bg-black dark:bg-white text-white dark:text-black font-extrabold rounded-xl hover:scale-105 active:scale-95 transition-all">دخول</button>
            </form>
            <button onclick="window.location.href='home.html'" class="mt-4 text-xs text-gray-400 hover:underline">العودة للمتجر</button>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="w-full bg-white/70 dark:bg-black/70 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center cursor-pointer" onclick="window.location.href='home.html'">
                    <span class="text-2xl md:text-3xl font-extrabold tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-500 dark:from-white dark:to-gray-400" dir="ltr">Limited Edition</span>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="window.location.href='home.html'" class="font-bold hover:text-gray-500 transition px-4 py-2 bg-gray-100 dark:bg-neutral-900 rounded-xl">عرض المتجر</button>
                    <button id="theme-toggle" class="p-2 md:p-3 rounded-full bg-gray-100 dark:bg-neutral-900 hover:bg-gray-200 dark:hover:bg-neutral-800 transition">
                        <span id="theme-icon" class="text-xl">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- محتوى لوحة التحكم -->
    <main id="admin-panel" class="py-12 px-4 sm:px-6 lg:px-8 max-w-2xl mx-auto w-full flex-grow hidden">
        
        <!-- فورم الإضافة -->
        <div class="bg-white dark:bg-neutral-900 rounded-3xl p-6 md:p-10 shadow-xl border border-gray-100 dark:border-neutral-800 mb-10">
            <h1 class="text-2xl md:text-3xl font-extrabold mb-6 text-center">إضافة منتج جديد</h1>
            
            <form id="add-product-form" class="flex flex-col gap-5">
                <div>
                    <label class="block font-bold mb-2 text-sm text-gray-600 dark:text-gray-400">اسم المنتج</label>
                    <input type="text" id="prod-name" required placeholder="مثال: تيشيرت رياضي أوفر سايز" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-800 focus:outline-none focus:border-gray-900 dark:focus:border-white transition-colors">
                </div>

                <div>
                    <label class="block font-bold mb-2 text-sm text-gray-600 dark:text-gray-400">السعر (بالجنيه)</label>
                    <input type="number" id="prod-price" required placeholder="مثال: 1200" class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-800 focus:outline-none focus:border-gray-900 dark:focus:border-white transition-colors">
                </div>

                <div>
                    <label class="block font-bold mb-2 text-sm text-gray-600 dark:text-gray-400">القسم</label>
                    <select id="prod-category" required class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-800 focus:outline-none focus:border-gray-900 dark:focus:border-white transition-colors">
                        <option value="" disabled selected>اختر القسم المناسب</option>
                        <option value="بنطلون">بنطلون</option>
                        <option value="شورتات">شورتات</option>
                        <option value="تيشيرتات اندية">تيشيرتات اندية</option>
                        <option value="تيشيرتات رياضية">تيشيرتات رياضية</option>
                        <option value="تيشيرتات حوض">تيشيرتات حوض</option>
                        <option value="بولو">بولو</option>
                        <option value="تيشيرتات صيفية سادة">تيشيرتات صيفية سادة</option>
                    </select>
                </div>

                <div>
                    <label class="block font-bold mb-2 text-sm text-gray-600 dark:text-gray-400">اختر صورة المنتج من التليفون</label>
                    <input type="file" id="prod-image-file" accept="image/*" required class="w-full px-4 py-3 rounded-xl bg-gray-50 dark:bg-black border border-gray-200 dark:border-gray-800 focus:outline-none file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-gray-200 dark:file:bg-neutral-800 file:text-gray-800 dark:file:text-gray-200 hover:file:bg-gray-300 transition-colors cursor-pointer">
                </div>

                <button type="submit" id="submit-btn" class="w-full mt-4 py-4 bg-black dark:bg-white text-white dark:text-black font-extrabold text-lg rounded-xl hover:shadow-lg active:scale-95 transition-all">
                    رفع المنتج إلى المتجر
                </button>
            </form>
        </div>

        <!-- قسم إدارة وحذف المنتجات -->
        <div class="bg-white dark:bg-neutral-900 rounded-3xl p-6 md:p-10 shadow-xl border border-gray-100 dark:border-neutral-800">
            <h2 class="text-xl md:text-2xl font-extrabold mb-6 text-center">إدارة وحذف المنتجات</h2>
            <div id="admin-products-list" class="flex flex-col gap-4">
                <p class="text-center text-gray-500">جاري تحميل المنتجات...</p>
            </div>
        </div>

    </main>

    <!-- الفوتر مع اسمك -->
    <footer class="bg-black text-white pt-8 pb-6 px-4 mt-auto border-t border-neutral-900 text-center text-sm text-gray-500 flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto w-full">
        <p>&copy; 2026 Limited Edition - Admin Panel</p>
        <p class="tracking-wide">
            Developed by <span class="font-bold text-gray-300">eng.elgizawy</span>
        </p>
    </footer>

    <!-- السكريبتات -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqf4HdoP9EocfZLjKUhXHh7-nddWW2uXg",
            authDomain: "limited-edittion.firebaseapp.com",
            projectId: "limited-edittion",
            storageBucket: "limited-edittion.firebasestorage.app",
            messagingSenderId: "836001119137",
            appId: "1:836001119137:web:cd08c89dca42982b3d29e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // رسالة الإشعار (Toast)
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast-notification');
            const toastIconContainer = document.getElementById('toast-icon-container');
            document.getElementById('toast-message').textContent = message;
            
            if (type === 'error') {
                toastIconContainer.classList.remove('bg-green-500');
                toastIconContainer.classList.add('bg-red-500');
            } else {
                toastIconContainer.classList.remove('bg-red-500');
                toastIconContainer.classList.add('bg-green-500');
            }

            toast.classList.remove('-translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-4', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-4', 'opacity-100');
                toast.classList.add('-translate-y-20', 'opacity-0');
            }, 3000);
        }

        // الباسورد السري الخفيف
        const authScreen = document.getElementById('auth-screen');
        const adminPanel = document.getElementById('admin-panel');

        document.getElementById('pass-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const pass = document.getElementById('pass-input').value;
            if (pass === '000000') {
                authScreen.style.opacity = '0';
                setTimeout(() => {
                    authScreen.style.display = 'none';
                    adminPanel.classList.remove('hidden');
                    loadAdminProducts();
                }, 300);
            } else {
                showToast('كلمة المرور غير صحيحة!', 'error');
                document.getElementById('pass-input').value = '';
            }
        });

        // الوضع الليلي
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            themeIcon.textContent = htmlElement.classList.contains('dark') ? '☀️' : '🌙'; 
        });

        function convertImageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // رفع المنتج
        document.getElementById('add-product-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            const category = document.getElementById('prod-category').value;
            const imageFile = document.getElementById('prod-image-file').files[0];
            const submitBtn = document.getElementById('submit-btn');

            if (!imageFile) { showToast('اختر صورة المنتج!', 'error'); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = 'جاري الرفع...';

            try {
                const base64Image = await convertImageToBase64(imageFile);
                await addDoc(collection(db, "products"), {
                    name, price, category, imageUrl: base64Image, createdAt: new Date()
                });
                showToast('تم رفع المنتج بنجاح ✔️');
                document.getElementById('add-product-form').reset();
                loadAdminProducts();
            } catch (error) {
                showToast('حصل خطأ أثناء الرفع.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'رفع المنتج إلى المتجر';
            }
        });

        // جلب المنتجات للحذف
        async function loadAdminProducts() {
            const listContainer = document.getElementById('admin-products-list');
            listContainer.innerHTML = '<p class="text-center text-gray-500">جاري التحميل...</p>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                listContainer.innerHTML = '';
                
                if (querySnapshot.empty) {
                    listContainer.innerHTML = '<p class="text-center text-gray-500">لا توجد منتجات حالياً.</p>';
                    return;
                }

                querySnapshot.forEach((document) => {
                    const prod = document.data();
                    const prodId = document.id;

                    const itemHTML = `
                        <div class="flex items-center justify-between bg-gray-50 dark:bg-black p-4 rounded-2xl border border-gray-200 dark:border-neutral-800">
                            <div class="flex items-center gap-4">
                                <img src="${prod.imageUrl}" class="w-14 h-14 object-cover rounded-xl">
                                <div>
                                    <h4 class="font-bold text-sm md:text-base">${prod.name}</h4>
                                    <p class="text-xs md:text-sm text-gray-500">${prod.price} EGP - <span class="bg-gray-200 dark:bg-neutral-800 px-2 py-0.5 rounded">${prod.category}</span></p>
                                </div>
                            </div>
                            <button onclick="deleteProduct('${prodId}')" class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl text-xs md:text-sm transition-colors">
                                حذف
                            </button>
                        </div>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', itemHTML);
                });
            } catch (error) {
                listContainer.innerHTML = '<p class="text-center text-red-500">فشل تحميل المنتجات.</p>';
            }
        }

        // مسح المنتج مع تأكيد شيك
        window.deleteProduct = async function(id) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                try {
                    await deleteDoc(doc(db, "products", id));
                    showToast('تم حذف المنتج بنجاح 🗑️');
                    loadAdminProducts();
                } catch (error) {
                    showToast('فشل مسح المنتج.', 'error');
                }
            }
        }
    </script>
</body>
</html>
