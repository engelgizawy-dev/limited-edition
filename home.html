        // تحديث عداد السلة
        function updateCartCounter() {

            document.getElementById('cart-counter').textContent = cart.length;
        }
        updateCartCounter();

        // عرض رسالة الإشعار الشيك (Toast)
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast-notification');
            const toastIconContainer = document.getElementById('toast-icon-container');
            const toastIcon = document.getElementById('toast-icon');
            
            document.getElementById('toast-message').textContent = message;
            
            if (type === 'success') {
                toast.classList.remove('bg-red-500');
                toast.classList.add('bg-neutral-900', 'dark:bg-white');
                document.getElementById('toast-message').classList.replace('text-white', 'text-white');
                document.getElementById('toast-message').classList.add('dark:text-black');
                
                toastIconContainer.classList.add('bg-green-500');
                toastIconContainer.classList.remove('bg-red-500');
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>';
            } else {
                toast.classList.remove('bg-neutral-900', 'dark:bg-white');
                toast.classList.add('bg-red-500');
                document.getElementById('toast-message').classList.replace('dark:text-black', 'text-white');
                
                toastIconContainer.classList.remove('bg-green-500');
                toastIconContainer.classList.add('bg-red-700');
                toastIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>';
            }

            toast.classList.remove('-translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-4', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-4', 'opacity-100');
                toast.classList.add('-translate-y-20', 'opacity-0');
            }, 3000);
        }

        async function fetchProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });

                if(allProducts.length > 0) {
                    renderProducts(allProducts);
                } else {
                    document.getElementById('products-grid').innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold text-xl bg-gray-50 dark:bg-neutral-900 rounded-3xl border border-dashed border-gray-300 dark:border-gray-700">لا توجد منتجات حالياً.</div>';
                }
            } catch (error) {
                console.error("Error fetching products: ", error);
            }
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = ''; 

            if(productsToRender.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 font-bold text-xl bg-gray-50 dark:bg-neutral-900 rounded-3xl border border-dashed border-gray-300 dark:border-gray-700">لا توجد منتجات في هذا القسم.</div>';
                return;
            }

            productsToRender.forEach(product => {
                const productData = encodeURIComponent(JSON.stringify(product));
                const card = `
                    <div class="group flex flex-col bg-white dark:bg-neutral-900 border border-gray-100 dark:border-gray-800 rounded-3xl overflow-hidden hover:shadow-[0_10px_40px_-10px_rgba(0,0,0,0.1)] dark:hover:shadow-[0_10px_40px_-10px_rgba(255,255,255,0.05)] transition-all duration-300 transform hover:-translate-y-1">
                        <div class="relative w-full h-72 md:h-80 bg-gray-50 dark:bg-neutral-800 overflow-hidden cursor-pointer" onclick="openModal('${productData}')">
                            <img src="${product.imageUrl || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                            <span class="absolute top-4 right-4 bg-white/90 dark:bg-black/90 text-black dark:text-white text-xs font-extrabold px-4 py-1.5 rounded-full backdrop-blur-md shadow-sm">${product.category}</span>
                        </div>
                        <div class="p-6 flex flex-col flex-grow border-t border-gray-50 dark:border-neutral-800">
                            <h3 class="text-lg font-bold mb-2 text-gray-900 dark:text-white line-clamp-1">${product.name || 'بدون اسم'}</h3>
                            <p class="text-2xl font-black text-gray-800 dark:text-gray-200 mt-auto mb-5">${product.price || '0'} EGP</p>
                            <button onclick="openModal('${productData}')" class="w-full py-3.5 bg-gray-100 dark:bg-neutral-800 hover:bg-gray-200 dark:hover:bg-neutral-700 text-gray-900 dark:text-white font-bold rounded-xl active:scale-95 transition-all">
                                تفاصيل المنتج
                            </button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        const categoryButtons = document.querySelectorAll('.category-btn');
        categoryButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                categoryButtons.forEach(btn => btn.classList.remove('active'));
                const clickedBtn = e.target;
                clickedBtn.classList.add('active');

                const selectedCategory = clickedBtn.getAttribute('data-category');
                if (selectedCategory === 'الكل') {
                    renderProducts(allProducts);
                } else {
                    const filtered = allProducts.filter(p => p.category === selectedCategory);
                    renderProducts(filtered);
                }
            });
        });

        fetchProducts();

        window.openModal = function(productDataEncoded) {
            const product = JSON.parse(decodeURIComponent(productDataEncoded));
            selectedProduct = product;
            selectedSize = null;
            selectedColor = null;

            document.getElementById('modal-img').src = product.imageUrl || 'https://via.placeholder.com/400';
            document.getElementById('modal-title').textContent = product.name;
            document.getElementById('modal-price').textContent = product.price + ' EGP';

            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('selected'));

            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            
            // تصميم المودال ليظهر من أسفل في الموبايل ومن المنتصف في الديسكتوب
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('translate-y-full', 'md:scale-95');
                modalContent.classList.add('translate-y-0', 'md:scale-100');
            }, 10);
        }

        window.closeModal = function() {
            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            modalContent.classList.remove('translate-y-0', 'md:scale-100');
            modalContent.classList.add('translate-y-full', 'md:scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedSize = e.target.textContent;
            });
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedColor = e.target.textContent;
            });
        });

        window.confirmAddToCart = function() {
            if(!selectedSize) { showToast('برجاء اختيار المقاس أولاً', 'error'); return; }
            if(!selectedColor) { showToast('برجاء اختيار اللون لتكتمل الإضافة', 'error'); return; }

            const cartItem = {
                id: selectedProduct.id + '-' + selectedSize + '-' + selectedColor,
                name: selectedProduct.name,
                price: parseFloat(selectedProduct.price),
                imageUrl: selectedProduct.imageUrl,
                size: selectedSize,
                color: selectedColor,
                quantity: 1
            };

            let cart = JSON.parse(localStorage.getItem('limited_cart')) || [];
            
            const existingItemIndex = cart.findIndex(item => item.id === cartItem.id);
            if(existingItemIndex > -1) {
                cart[existingItemIndex].quantity += 1;
            } else {
                cart.push(cartItem);
            }

            localStorage.setItem('limited_cart', JSON.stringify(cart));
            updateCartCounter();
            closeModal();
            
            // إظهار رسالة النجاح الشيك
            setTimeout(() => {
                showToast(`تمت الإضافة للسلة بنجاح ✔️`);
            }, 300);
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            themeIcon.textContent = htmlElement.classList.contains('dark') ? '☀️' : '🌙'; 
        });

    </script>
</body>
</html>
