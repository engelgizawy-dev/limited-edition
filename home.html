<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limited Edition | تسوق الآن</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .category-btn.active { background-color: #000; color: #fff; border-color: #000; }
        html.dark .category-btn.active { background-color: #fff; color: #000; border-color: #fff; }

        /* ستايل زراير المقاسات والألوان لما يتم اختيارها */
        .option-btn.selected { border-color: #000; background-color: #000; color: #fff; }
        html.dark .option-btn.selected { border-color: #fff; background-color: #fff; color: #000; }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-50 dark:bg-black text-gray-900 dark:text-gray-100 transition-colors duration-300 antialiased relative">

    <!-- Navbar -->
    <nav class="fixed w-full top-0 z-40 bg-white/30 dark:bg-black/40 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.location.href='index.html'">
                    <span class="text-3xl font-extrabold tracking-widest uppercase" dir="ltr">Limited Edition</span>
                </div>
                <div class="flex items-center gap-4">
                    <!-- أيقونة السلة -->
                    <button class="relative p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span id="cart-counter" class="absolute top-0 right-0 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full transform translate-x-1 -translate-y-1">0</span>
                    </button>
                    <!-- زرار الوضع الليلي -->
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition">
                        <span id="theme-icon" class="text-xl">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-16 px-4 sm:px-6 lg:px-8 min-h-screen max-w-7xl mx-auto">
        <!-- شريط الأقسام -->
        <div class="mb-10">
            <h1 class="text-3xl font-bold mb-6">تسوق أحدث المنتجات</h1>
            <div id="categories-container" class="flex overflow-x-auto gap-3 pb-4 scrollbar-hide cursor-grab">
                <button class="category-btn active whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="الكل">الكل</button>
                <button class="category-btn whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="بنطلون">بنطلون</button>
                <button class="category-btn whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="شورتات">شورتات</button>
                <button class="category-btn whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="تيشيرتات اندية">تيشيرتات اندية</button>
                <button class="category-btn whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="تيشيرتات رياضية">تيشيرتات رياضية</button>
                <button class="category-btn whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="تيشيرتات حوض">تيشيرتات حوض</button>
                <button class="category-btn whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="بولو">بولو</button>
                <button class="category-btn whitespace-nowrap px-6 py-2 rounded-full border-2 border-gray-300 dark:border-gray-700 font-bold transition-all" data-category="تيشيرتات صيفية سادة">تيشيرتات صيفية سادة</button>
            </div>
        </div>

        <!-- شبكة المنتجات -->
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-12 text-gray-500 font-bold text-xl">
                في انتظار إضافة المنتجات من لوحة التحكم...
            </div>
        </div>
    </main>

    <!-- Modal (النافذة المنبثقة لاختيار المقاس واللون) -->
    <div id="product-modal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white dark:bg-neutral-900 w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl relative transform scale-95 transition-transform duration-300" id="modal-content">
            
            <!-- زرار الإغلاق -->
            <button onclick="closeModal()" class="absolute top-4 left-4 z-10 p-2 bg-black/50 text-white rounded-full hover:bg-black transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <!-- صورة المنتج في المودال -->
            <div class="h-64 w-full bg-gray-200 dark:bg-neutral-800">
                <img id="modal-img" src="" alt="" class="w-full h-full object-cover">
            </div>

            <div class="p-6">
                <h3 id="modal-title" class="text-2xl font-bold mb-1">اسم المنتج</h3>
                <p id="modal-price" class="text-xl font-extrabold text-gray-600 dark:text-gray-300 mb-6">0 EGP</p>

                <!-- اختيار المقاس -->
                <div class="mb-5">
                    <h4 class="font-bold mb-3">اختر المقاس:</h4>
                    <div class="flex gap-3" id="size-options">
                        <button class="option-btn size-btn w-12 h-12 flex items-center justify-center rounded-xl border-2 border-gray-300 dark:border-gray-700 font-bold transition">S</button>
                        <button class="option-btn size-btn w-12 h-12 flex items-center justify-center rounded-xl border-2 border-gray-300 dark:border-gray-700 font-bold transition">M</button>
                        <button class="option-btn size-btn w-12 h-12 flex items-center justify-center rounded-xl border-2 border-gray-300 dark:border-gray-700 font-bold transition">L</button>
                        <button class="option-btn size-btn w-12 h-12 flex items-center justify-center rounded-xl border-2 border-gray-300 dark:border-gray-700 font-bold transition">XL</button>
                    </div>
                </div>

                <!-- اختيار اللون -->
                <div class="mb-8">
                    <h4 class="font-bold mb-3">اختر اللون:</h4>
                    <div class="flex gap-3" id="color-options">
                        <button class="option-btn color-btn px-4 py-2 rounded-xl border-2 border-gray-300 dark:border-gray-700 font-bold transition">أسود</button>
                        <button class="option-btn color-btn px-4 py-2 rounded-xl border-2 border-gray-300 dark:border-gray-700 font-bold transition">أبيض</button>
                        <button class="option-btn color-btn px-4 py-2 rounded-xl border-2 border-gray-300 dark:border-gray-700 font-bold transition">كحلي</button>
                    </div>
                </div>

                <!-- زرار التأكيد -->
                <button onclick="confirmAddToCart()" class="w-full py-4 bg-black dark:bg-white text-white dark:text-black font-bold text-lg rounded-xl hover:scale-105 active:scale-95 transition-transform shadow-lg">
                    تأكيد وإضافة للسلة
                </button>
            </div>
        </div>
    </div>

    <!-- سكريبتات التحكم -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqf4HdoP9EocfZLjKUhXHh7-nddWW2uXg",
            authDomain: "limited-edittion.firebaseapp.com",
            projectId: "limited-edittion",
            storageBucket: "limited-edittion.firebasestorage.app",
            messagingSenderId: "836001119137",
            appId: "1:836001119137:web:cd08c89dca42982b3d29e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [];
        let selectedProduct = null;
        let selectedSize = null;
        let selectedColor = null;

        async function fetchProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });

                if(allProducts.length > 0) {
                    renderProducts(allProducts);
                }
            } catch (error) {
                console.error("Error fetching products: ", error);
            }
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = ''; 

            if(productsToRender.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500 font-bold text-xl">لا توجد منتجات في هذا القسم حالياً.</div>';
                return;
            }

            productsToRender.forEach(product => {
                // حولنا الداتا لنص عشان نعرف نبعتها لدالة فتح المودال
                const productData = encodeURIComponent(JSON.stringify(product));
                
                const card = `
                    <div class="group flex flex-col bg-white dark:bg-neutral-900 border border-gray-200 dark:border-gray-800 rounded-2xl overflow-hidden hover:shadow-2xl transition-all duration-300">
                        <div class="relative w-full h-72 bg-gray-100 dark:bg-neutral-800 overflow-hidden cursor-pointer" onclick="openModal('${productData}')">
                            <img src="${product.imageUrl || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <span class="absolute top-3 right-3 bg-black/70 text-white text-xs font-bold px-3 py-1 rounded-full backdrop-blur-sm">${product.category}</span>
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold mb-2">${product.name || 'بدون اسم'}</h3>
                            <p class="text-xl font-extrabold text-gray-900 dark:text-white mt-auto mb-4">${product.price || '0'} EGP</p>
                            <button onclick="openModal('${productData}')" class="w-full py-3 bg-black dark:bg-white text-white dark:text-black font-bold rounded-xl hover:scale-105 active:scale-95 transition-transform">
                                عرض التفاصيل والمقاس
                            </button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        // منطق الفلاتر
        const categoryButtons = document.querySelectorAll('.category-btn');
        categoryButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                categoryButtons.forEach(btn => btn.classList.remove('active'));
                const clickedBtn = e.target;
                clickedBtn.classList.add('active');

                const selectedCategory = clickedBtn.getAttribute('data-category');
                if (selectedCategory === 'الكل') {
                    renderProducts(allProducts);
                } else {
                    const filtered = allProducts.filter(p => p.category === selectedCategory);
                    renderProducts(filtered);
                }
            });
        });

        fetchProducts();

        // ---------- لوجيك الـ Modal (النافذة المنبثقة) ---------- //
        
        window.openModal = function(productDataEncoded) {
            const product = JSON.parse(decodeURIComponent(productDataEncoded));
            selectedProduct = product;
            selectedSize = null; // تصفير الاختيارات
            selectedColor = null;

            // تحديث بيانات المودال
            document.getElementById('modal-img').src = product.imageUrl || 'https://via.placeholder.com/400';
            document.getElementById('modal-title').textContent = product.name;
            document.getElementById('modal-price').textContent = product.price + ' EGP';

            // تصفير شكل الزراير جوه المودال
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('selected'));

            // إظهار المودال بالأنيميشن
            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        window.closeModal = function() {
            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // اختيار المقاس
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedSize = e.target.textContent;
            });
        });

        // اختيار اللون
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedColor = e.target.textContent;
            });
        });

        // تأكيد الإضافة للسلة
        let cartCount = 0;
        window.confirmAddToCart = function() {
            if(!selectedSize) {
                alert('عشان خاطري اختار المقاس الأول يا هندسة!');
                return;
            }
            if(!selectedColor) {
                alert('طب واللون؟ اختار لون عشان نعرف نبعتلك إيه.');
                return;
            }

            // هنا بنزود العداد بتاع السلة كشكل مبدئي
            cartCount++;
            document.getElementById('cart-counter').textContent = cartCount;
            
            // قفل المودال بعد الإضافة
            closeModal();
            
            // رسالة تأكيد شيك
            setTimeout(() => {
                alert(`تم إضافة (${selectedProduct.name} - مقاس ${selectedSize} - لون ${selectedColor}) للسلة بنجاح!`);
            }, 350);
        }

        // الوضع الليلي
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            themeIcon.textContent = htmlElement.classList.contains('dark') ? '☀️' : '🌙'; 
        });

    </script>
</body>
</html>
