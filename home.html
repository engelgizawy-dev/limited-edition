    <!-- السكريبتات -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqf4HdoP9EocfZLjKUhXHh7-nddWW2uXg",
            authDomain: "limited-edittion.firebaseapp.com",
            projectId: "limited-edittion",
            storageBucket: "limited-edittion.firebasestorage.app",
            messagingSenderId: "836001119137",
            appId: "1:836001119137:web:cd08c89dca42982b3d29e0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allProducts = [];
        let selectedProduct = null;
        let selectedSize = null;
        let selectedColor = null;

        // تحديث عداد السلة من الـ LocalStorage أول ما الصفحة تفتح
        function updateCartCounter() {
            const cart = JSON.parse(localStorage.getItem('limited_cart')) || [];
            document.getElementById('cart-counter').textContent = cart.length;
        }
        updateCartCounter();

        async function fetchProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });

                if(allProducts.length > 0) {
                    renderProducts(allProducts);
                } else {
                    document.getElementById('products-grid').innerHTML = '<div class="col-span-full text-center py-12 text-gray-500 font-bold text-xl">لا توجد منتجات حالياً.</div>';
                }
            } catch (error) {
                console.error("Error fetching products: ", error);
            }
        }

        function renderProducts(productsToRender) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = ''; 

            if(productsToRender.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-500 font-bold text-xl">لا توجد منتجات في هذا القسم.</div>';
                return;
            }

            productsToRender.forEach(product => {
                const productData = encodeURIComponent(JSON.stringify(product));
                const card = `
                    <div class="group flex flex-col bg-white dark:bg-neutral-900 border border-gray-200 dark:border-gray-800 rounded-2xl overflow-hidden hover:shadow-2xl transition-all duration-300">
                        <div class="relative w-full h-72 bg-gray-100 dark:bg-neutral-800 overflow-hidden cursor-pointer" onclick="openModal('${productData}')">
                            <img src="${product.imageUrl || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <span class="absolute top-3 right-3 bg-black/70 text-white text-xs font-bold px-3 py-1 rounded-full backdrop-blur-sm">${product.category}</span>
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold mb-2">${product.name || 'بدون اسم'}</h3>
                            <p class="text-xl font-extrabold text-gray-900 dark:text-white mt-auto mb-4">${product.price || '0'} EGP</p>
                            <button onclick="openModal('${productData}')" class="w-full py-3 bg-black dark:bg-white text-white dark:text-black font-bold rounded-xl hover:scale-105 active:scale-95 transition-transform">
                                اختيار المقاس
                            </button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        const categoryButtons = document.querySelectorAll('.category-btn');
        categoryButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                categoryButtons.forEach(btn => btn.classList.remove('active'));
                const clickedBtn = e.target;
                clickedBtn.classList.add('active');

                const selectedCategory = clickedBtn.getAttribute('data-category');
                if (selectedCategory === 'الكل') {
                    renderProducts(allProducts);
                } else {
                    const filtered = allProducts.filter(p => p.category === selectedCategory);
                    renderProducts(filtered);
                }
            });
        });

        fetchProducts();

        window.openModal = function(productDataEncoded) {
            const product = JSON.parse(decodeURIComponent(productDataEncoded));
            selectedProduct = product;
            selectedSize = null;
            selectedColor = null;

            document.getElementById('modal-img').src = product.imageUrl || 'https://via.placeholder.com/400';
            document.getElementById('modal-title').textContent = product.name;
            document.getElementById('modal-price').textContent = product.price + ' EGP';

            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('selected'));

            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        window.closeModal = function() {
            const modal = document.getElementById('product-modal');
            const modalContent = document.getElementById('modal-content');
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedSize = e.target.textContent;
            });
        });

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedColor = e.target.textContent;
            });
        });

        window.confirmAddToCart = function() {
            if(!selectedSize) { alert('عشان خاطري اختار المقاس الأول يا هندسة!'); return; }
            if(!selectedColor) { alert('طب واللون؟ اختار لون عشان نعرف نبعتلك إيه.'); return; }

            // تجهيز بيانات المنتج للإضافة
            const cartItem = {
                id: selectedProduct.id + '-' + selectedSize + '-' + selectedColor, // ID مميز عشان لو اختار نفس المنتج بمقاس تاني
                name: selectedProduct.name,
                price: parseFloat(selectedProduct.price),
                imageUrl: selectedProduct.imageUrl,
                size: selectedSize,
                color: selectedColor,
                quantity: 1
            };

            // سحب السلة القديمة وتحديثها
            let cart = JSON.parse(localStorage.getItem('limited_cart')) || [];
            
            // التأكد لو المنتج موجود نزود الكمية بس
            const existingItemIndex = cart.findIndex(item => item.id === cartItem.id);
            if(existingItemIndex > -1) {
                cart[existingItemIndex].quantity += 1;
            } else {
                cart.push(cartItem);
            }

            // حفظ في المتصفح
            localStorage.setItem('limited_cart', JSON.stringify(cart));
            
            updateCartCounter();
            closeModal();
            setTimeout(() => {
                alert(`تم الإضافة بنجاح!`);
            }, 300);
        }

        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            themeIcon.textContent = htmlElement.classList.contains('dark') ? '☀️' : '🌙'; 
        });

    </script>
</body>
</html>
