<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limited Edition | Clothing Brand</title>
    
    <!-- استدعاء Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- إعدادات Tailwind للوضع الليلي والخطوط -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'], // تقدر تغير الخط زي ما تحب
                    }
                }
            }
        }
    </script>

    <!-- ربط Firebase (كدوال منفصلة Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqf4HdoP9EocfZLjKUhXHh7-nddWW2uXg",
            authDomain: "limited-edittion.firebaseapp.com",
            projectId: "limited-edittion",
            storageBucket: "limited-edittion.firebasestorage.app",
            messagingSenderId: "836001119137",
            appId: "1:836001119137:web:cd08c89dca42982b3d29e0",
            measurementId: "G-KEDBNT2FZL"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        console.log("Firebase Initialized Successfully!");
    </script>

    <!-- استدعاء خطوط جوجل -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-neutral-50 dark:bg-black text-gray-900 dark:text-gray-100 transition-colors duration-300 antialiased selection:bg-gray-900 selection:text-white dark:selection:bg-white dark:selection:text-black">

    <!-- Navbar - Glassmorphism -->
    <nav class="fixed w-full top-0 z-50 bg-white/30 dark:bg-black/40 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <!-- اسم البراند (على اليمين بسبب الـ RTL) -->
                <div class="flex-shrink-0 flex items-center">
                    <span class="text-3xl font-extrabold tracking-widest uppercase" dir="ltr">
                        Limited Edition
                    </span>
                </div>

                <!-- أزرار النافبار (على اليسار) -->
                <div class="flex items-center gap-6">
                    <a href="#" class="hidden md:block font-medium hover:text-gray-500 transition">المجموعات</a>
                    <a href="#" class="hidden md:block font-medium hover:text-gray-500 transition">تسوق الآن</a>
                    
                    <!-- زرار الوضع الليلي -->
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition flex items-center justify-center">
                        <span id="theme-icon" class="text-xl">☀️</span>
                    </button>
                </div>

            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="pt-32 pb-16 px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center min-h-[80vh] text-center">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tight mb-6">
            اكتشف هويتك مع <br />
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-gray-500 to-gray-900 dark:from-gray-400 dark:to-white" dir="ltr">
                Limited Edition
            </span>
        </h1>
        <p class="mt-4 max-w-2xl text-lg text-gray-600 dark:text-gray-400 mb-10 mx-auto">
            تصميمات فريدة مصنوعة بعناية عشان تعبر عنك. خامات بريميوم وتفاصيل بتعمل الفرق في كل قطعة.
        </p>
        
        <div class="flex justify-center gap-4 flex-wrap">
            <button class="px-8 py-4 bg-black dark:bg-white text-white dark:text-black font-bold rounded-full hover:scale-105 transition-transform shadow-lg">
                تصفح التشكيلة الجديدة
            </button>
            <button class="px-8 py-4 bg-transparent border-2 border-black dark:border-white font-bold rounded-full hover:bg-gray-100 dark:hover:bg-gray-900 transition-colors">
                عن البراند
            </button>
        </div>
    </main>

    <!-- قسم أحدث القطع (منتجات تجريبية) -->
    <section class="max-w-7xl mx-auto px-4 py-16 border-t border-gray-200 dark:border-gray-800">
        <h2 class="text-3xl font-bold mb-8 text-right">أحدث القطع</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
            
            <!-- كارت المنتج الأول -->
            <div class="group cursor-pointer">
                <div class="w-full h-96 bg-gray-200 dark:bg-gray-900 rounded-2xl mb-4 overflow-hidden relative">
                    <!-- خلفية كعنصر نائب للصورة -->
                    <div class="w-full h-full bg-gradient-to-tr from-gray-300 to-gray-100 dark:from-gray-800 dark:to-gray-700 group-hover:scale-105 transition-transform duration-500"></div>
                </div>
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-xl font-medium">تيشيرت بيزك أسود</h3>
                    <span class="text-lg font-bold">1,200 EGP</span>
                </div>
            </div>

            <!-- كارت المنتج الثاني -->
            <div class="group cursor-pointer">
                <div class="w-full h-96 bg-gray-200 dark:bg-gray-900 rounded-2xl mb-4 overflow-hidden relative">
                    <div class="w-full h-full bg-gradient-to-tr from-gray-300 to-gray-100 dark:from-gray-800 dark:to-gray-700 group-hover:scale-105 transition-transform duration-500"></div>
                </div>
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-xl font-medium">هودي أوفر سايز</h3>
                    <span class="text-lg font-bold">2,500 EGP</span>
                </div>
            </div>

            <!-- كارت المنتج الثالث -->
            <div class="group cursor-pointer">
                <div class="w-full h-96 bg-gray-200 dark:bg-gray-900 rounded-2xl mb-4 overflow-hidden relative">
                    <div class="w-full h-full bg-gradient-to-tr from-gray-300 to-gray-100 dark:from-gray-800 dark:to-gray-700 group-hover:scale-105 transition-transform duration-500"></div>
                </div>
                <div class="flex justify-between items-center px-2">
                    <h3 class="text-xl font-medium">بنطلون كارجو</h3>
                    <span class="text-lg font-bold">1,800 EGP</span>
                </div>
            </div>

        </div>
    </section>

    <!-- سكريبت الوضع الليلي -->
    <script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        // دالة التبديل
        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            
            if (htmlElement.classList.contains('dark')) {
                themeIcon.textContent = '☀️'; // لو شغال ليلي، اعرض أيقونة الشمس
            } else {
                themeIcon.textContent = '🌙'; // لو شغال ساطع، اعرض أيقونة القمر
            }
        });
    </script>
</body>
</html>
